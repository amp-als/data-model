#######################################
# Base File Schema
# Common attributes shared by all file types
#######################################

classes:
  BaseFile:
    abstract: true
    description: Base schema for all file types with common metadata attributes
    mixins: [DiseaseMixin, CommonMetadataMixin]
    attributes:
      title:
        title: Title
        range: string
        required: false
      keywords:
        title: Keywords
        range: string
        multivalued: true
        required: false
      dataType:
        title: Data Type
        range: Data
        description: Reflects the data types within the file.
        multivalued: true
        required: false
