#######################################
# Base Dataset Schema
# Common attributes shared by all dataset types
#######################################

classes:
  BaseDataset:
    abstract: true
    description: Base schema for all dataset types with common metadata attributes
    mixins: [DiseaseMixin, CommonMetadataMixin]
    attributes:
      title:
        title: Title
        range: string
        required: true
      keywords:
        title: Keywords
        range: string
        multivalued: true
        required: true
      funder:
        title: Funder
        range: string
        multivalued: true
        required: false
      participant_count:
        title: Participant Count
        range: integer
        description: Number of unique individuals included in the dataset (whether as individual-level or as aggregate data). Omit if not applicable/unknown.
        required: false
      curationLevel:
        title: Curation level
        range: CurationLevelEnum
        description: TBD
        required: false
      studyType:
        title: Study type
        range: StudyLevelEnum
        description: Study type for dataset
        required: false
        multivalued: true
      datePublished:
        title: Date Published
        description: Date data were published/available on Synapse.
        range: integer
        required: false
      dataset_code:
        title: Dataset Code
        range: string
        description: Stable dataset code combining data model type and dataset identifier (e.g., sdtm_als1003, omop_als1001). Excludes version dates.
        required: false
        pattern: "^(src|omop|sdtm|send|adam)_als\\d+$"
      portalRelease:
        title: Portal Release
        range: string
        description: Portal release version(s) in which this dataset is included (e.g. "2025.2").
        multivalued: true
        required: false
      cohortType:
        title: Cohort Type
        range: CohortTypeEnum
        description: Types of cohorts available in this dataset.
        multivalued: true
        required: true
      cohort_count:
        title: Cohort Count
        range: integer
        description: Number of cohorts in this dataset.
        required: true
      study_count:
        title: Study Count
        range: integer
        description: Number of studies in this dataset.
        required: true
      acknowledgementStatement:
        title: Acknowledgement Statement
        range: string
        description: Statement or link describing how use of this dataset should be acknowledged.
        multivalued: true
        required: false

enums:
  CohortTypeEnum:
    permissible_values:
      Case-Control:
        description: Case-control cohort comparing disease cases and healthy controls
