#######################################
# File Mixins
# Reusable attribute groups for different file types
#######################################

classes:
  FileAnnotationsMixin:
    mixin: true
    description: Mixin for biological annotation and analysis method attributes shared across file types
    attributes:
      annotations:
        title: Biological Annotations
        range: AnnotationTypeEnum
        description: Types of biological databases and annotations referenced in this file.
        multivalued: true
        required: false
      analysisTypes:
        title: Analysis Types
        range: AnalysisMethodEnum
        description: Computational and statistical analysis methods applied to the data.
        multivalued: true
        required: false

  ClinicalFileMixin:
    mixin: true
    description: Mixin for clinical file specific attributes
    mixins: [SubjectIdentifierMixin, FileAnnotationsMixin]
    attributes:
      clinicalDomain:
        title: Clinical Domain
        description: The primary clinical domain or area of focus for the data
        range: ClinicalDomainEnum
        multivalued: true
        required: false
      studyPhase:
        title: Study Phase
        range: string
        description: Phase or stage of the clinical study when file was generated
        required: false
      visitType:
        title: Visit Type
        range: string
        description: Type of clinical visit (baseline, follow-up, etc.)
        required: false

  OmicFileMixin:
    mixin: true
    description: Mixin for omic file specific attributes
    mixins: [SubjectIdentifierMixin, SpecimenTypeMixin, FileAnnotationsMixin, SubjectDemographicsMixin]
    attributes:
      assay:
        title: Measurement Technique
        range: AssayEnum
        multivalued: true
        description: What's used to generate data in file, typically referring to the assay. Omit if not applicable.
        required: false
      GEOSuperSeries:
        title: GEO SuperSeries
        range: string
        description: GEO SuperSeries identifier
        required: false
      originalSampleId:
        title: Original Sample ID
        range: string
        description: Original sample identifier as provided by the data source.
        required: false
      FACSPopulation:
        title: FACS Population
        range: string
        description: FACS-sorted cell population description
        required: false
      libraryLayout:
        title: Library Layout
        range: LibraryLayoutEnum
        description: Single-end or paired-end sequencing layout for files containing sequencing data.
        multivalued: true
        required: false
      libraryPreparationMethod:
        title: Library Preparation Method
        range: LibraryPreparationMethodEnum
        description: Method or kit used for library preparation.
        required: false
      alignmentMethod:
        title: Alignment Method
        range: AlignmentMethodEnum
        description: Tool or method used for sequence alignment.
        required: false
      genomeReference:
        title: Reference Genome
        range: GenomicReferenceEnum
        description: Reference genome used for alignment.
        required: false
