### AMP-ALS portal-specific enums

enums:
  CurationLevelEnum:
    permissible_values:
      Raw:
      Standardized:
      Non-Standardized:
      Unknown:
  StudyLevelEnum:
    permissible_values:
      # Clinical study types
      Patient Registry Study:
        description: Registry-based patient data collection
      Natural History Study:
        description: Observational study tracking disease progression
      Clinical Trial:
        description: Interventional study testing treatments
      Observational Study:
        description: Non-interventional observational research
      # Omic study types
      Case-Control Study:
        description: Comparison between disease cases and healthy controls
      Cohort Study:
        description: Longitudinal study following a cohort over time
      Cross-Sectional Study:
        description: Data collected at a single time point across subjects
      Longitudinal Study:
        description: Repeated measurements from same subjects over time
      Discovery Study:
        description: Exploratory study to identify patterns or biomarkers
      Validation Study:
        description: Study to validate previously identified findings
      Multi-Omics Study:
        description: Integrating multiple omic data types (genomics, transcriptomics, proteomics, etc.)
      Comparative Study:
        description: Comparing different conditions, treatments, or populations
      Pilot Study:
        description: Small-scale preliminary study
      Replication Study:
        description: Study replicating findings from previous research
      Time Series Study:
        description: Sequential measurements over time to study dynamics
      Population Study:
        description: Large-scale population-level genomic or omic analysis
      Unknown:
        description: Study type unknown or not specified
  AccessTypeEnum:
    description: (Draft) Labels for how the AMP-ALS federated network defines access
    permissible_values:
      Federated: Authenticate with passport to provide access.
  CollectionEnum:
    description: Original collection, e.g. the consortium that the dataset comes from.
    permissible_values:
      ALS Knowledge Portal:
        description: Default collection
      Answer ALS:
      CReATe Consortium:
      'Genomic Translation for ALS Care (GTAC)':
      New York Genome Center ALS Consortium:
      National Institutes of Health:
      Project MinE:
      ALS Compute:
      Target ALS:
        description: Target ALS consortium 
      amp_als:
        description: AMP-ALS Knowledge Portal
      target_als:
        description: Target ALS consortium
      all_als:
        description: ALL ALS consortium
      c_path:
        description: Critical Path Institute
      alsdb:
        description: ALS Database
      geo:
        description: Gene Expression Omnibus
      sra:
        description: Sequence Read Archive
      als_compute:
        description: ALS Compute Portal
  SourceNode:
    description: Source nodes within the federated network.
    permissible_values:
      Critical Path Institute:
        description: https://www.c-path.org/
      Gene Expression Omnibus:
        description: https://www.ncbi.nlm.nih.gov/geo/
      ALS Compute:
        description: https://anvilproject.org/news/2023/09/05/data-release-als-compute-project
      Target ALS:
        description: targetals.org
      Synapse:
        description: synapse.org
