### AMP-ALS portal-specific enums

enums:
  StudyLevelEnum:
    permissible_values:
      # Clinical study types
      Patient Registry Study:
        description: Registry-based patient data collection
      Natural History Study:
        description: Observational study tracking disease progression
      Clinical Trial:
        description: Interventional study testing treatments
      Observational Study:
        description: Non-interventional observational research
      # Omic study types
      Case-Control Study:
        description: Comparison between disease cases and healthy controls
      Cohort Study:
        description: Longitudinal study following a cohort over time
      Cross-Sectional Study:
        description: Data collected at a single time point across subjects
      Longitudinal Study:
        description: Repeated measurements from same subjects over time
      Discovery Study:
        description: Exploratory study to identify patterns or biomarkers
      Validation Study:
        description: Study to validate previously identified findings
      Multi-Omics Study:
        description: Integrating multiple omic data types (genomics, transcriptomics, proteomics, etc.)
      Comparative Study:
        description: Comparing different conditions, treatments, or populations
      Pilot Study:
        description: Small-scale preliminary study
      Replication Study:
        description: Study replicating findings from previous research
      Time Series Study:
        description: Sequential measurements over time to study dynamics
      Population Study:
        description: Large-scale population-level genomic or omic analysis
      Harmonized Study Collection:
        description: A curated collection of harmonized datasets aggregated across multiple studies or cohorts
      Unknown:
        description: Study type unknown or not specified
      # Data aggregation levels
      individual:
        description: Individual-level data
      aggregate:
        description: Aggregate population-level data
      summary_level:
        description: Summary statistics
      meta_analysis:
        description: Meta-analysis results
      experimental study: 
        description: scientific investigation where researchers deliberately manipulate one or more independent variables to observe their effect on dependent variables
