      ALS UMN-Predominant:
        description: ALS with upper motor neuron predominant presentation
      ALS UMN-Predominant (PLS):
        description: ALS with upper motor neuron predominant presentation resembling PLS
      Flail Arm:
        description: Flail arm variant of ALS with predominant proximal upper limb weakness
      Focal MND:
