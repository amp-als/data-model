#######################################
# Common Enums Shared Across All Modules
#######################################

enums:
  # Access and permissions
  AccessTypeEnum:
    permissible_values:
      open:
        description: Open access, no restrictions
      controlled:
        description: Controlled access, authorization required
      private:
        description: Private access, restricted to specific users
      embargo:
        description: Under embargo, restricted until release date

  # Data governance
  CurationLevelEnum:
    permissible_values:
      tier1:
        description: Tier 1 - Raw data, minimal curation
      tier2:
        description: Tier 2 - Validated data with quality control
      tier3:
        description: Tier 3 - Analysis-ready data with comprehensive metadata
      unknown:
        description: Curation level unknown

  # Library layouts for sequencing
  LibraryLayoutEnum:
    permissible_values:
      single:
        description: Single-end sequencing
      paired:
        description: Paired-end sequencing

  # Disease classifications
  DiseaseEnum:
    permissible_values:
      ALS:
        description: Amyotrophic Lateral Sclerosis
      FTD:
        description: Frontotemporal Dementia
      Control:
        description: Healthy control
      Unknown:
        description: Disease status unknown
      PLS: 
        description: Primary Lateral Sclerosis
      LBD: 
        description: Lewy Body Dementia
      AD: 
        description: Alzheimer's Disease
      PMA: 
        description: Progressive Muscular Atrophy
      PBP:
        description: Progressive Bulbar Palsy
      Mitocondrial Myopathy: 
        description: group of genetic, often progressive neuromuscular diseases causing, primarily, severe muscle weakness and exercise intolerance, resulting from dysfunctional mitochondria failing to produce enough energy (ATP)
      PD:
        description: Parkinson's Disease
      Spastic paraparesis:
        description: a clinical term for progressive weakness and stiffness (spasticity) in the legs
      MSA:
        description: Multipel System Atrophy is a rare, progressive neurodegenerative disorder affecting involuntary functions (blood pressure, digestion) and motor control
      VCP myopathy:
        description: a rare, autosomal dominant genetic disease caused by mutations in the VCP gene
      Hirayama disease: 
        description: It is a rare, benign, self-limiting neurological disorder that typically affects males aged 15–25, causing progressive weakness and muscle atrophy in one or both forearms and hands that usually stabilizes within 3–5 years and is thought to result from dynamic cervical cord compression during neck flexion
      Kennedy's disease: 
        description: Kennedy's disease, or spinal and bulbar muscular atrophy (SBMA), is a rare, X-linked genetic neurodegenerative disorder primarily affecting men, characterized by slow progressive muscle weakness and wasting
      Spinal muscular atrophy:
        description: spinal muscular atrophy (SMA) is a rare, inherited genetic disease causing progressive muscle weakness and atrophy (wasting) due to the loss of motor neurons in the spinal cord

