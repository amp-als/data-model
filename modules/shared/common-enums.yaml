  SiteOfOnsetEnum:
    description: Site of disease onset
    permissible_values:
      Bulbar:
        description: Bulbar onset (speech, swallowing)
      Limb:
        description: Limb onset (arm or leg)
      Lumbar:
        description: Lumbar onset (lower limb/lumbar region)
      Axial:
        description: The disease originates in the paravertebral muscles, frequently presenting with postural changes like a stooped posture or "dropped head" syndrome.
      Respiratory:
        description: Respiratory onset
      Generalized:
        description: Generalized onset across multiple regions
      Other: 
        description: other onset sites
      Cognitive:
        description: cognitive or behavioral changes (Frontotemporal Dementia) may be the first sign of the disease, appearing months or even years before any muscle weakness. 
      Head Drop: 
        description: Dropped Head Syndrome (DHS) as the very first manifestation of a disease. severe weakness in the neck extensor muscles. Patients find it difficult or impossible to hold their head upright, leading to a "chin-on-chest" posture.
      Unknown:
        description: Site of onset unknown
