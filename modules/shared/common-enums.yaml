        description: ALS associated with other or unspecified gene variant
      ALS Spectrum MND:
        description: range of motor neuron diseases sharing similar biological underpinnings, including variants that primarily affect only upper or lower motor neurons

      # El Escorial Revised Diagnostic Criteria
      Definite_ALS:
        description: Definite ALS by El Escorial revised criteria - UMN and LMN signs in 3+ regions
      Probable_ALS:
        description: Probable ALS by El Escorial revised criteria - UMN and LMN signs in 2+ regions
      Probable_ALS_Lab_Supported:
        description: Probable ALS with laboratory support - clinical evidence in 1-2 regions plus EMG findings
      Possible_ALS:
        description: Possible ALS by El Escorial revised criteria - UMN and LMN signs in 1 region
      Suspected_ALS:
        description: Suspected ALS - LMN signs only in 2+ regions
      pre-fALS:
        description: Pre-symptomatic Familial Amyotrophic Lateral Sclerosis
      MUSK Myasthenia:
        description: Muscle-specific tyrosine kinase (MuSK) myasthenia gravis (MG) is a rare, severe autoimmune subtype of MG (5–8% of cases) characterized by antibodies attacking the MuSK receptor

      Anxiety for ALS:
        description: Subject presenting with anxiety about ALS without confirmed diagnosis
      Atypical for GM1 ab:
        description: Atypical presentation for GM1 antibody-associated disease

      # ALS clinical subtypes
      LMND:
