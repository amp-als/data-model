#######################################
# All Dataset Schemas Combined
# Base, Clinical, and Omic dataset definitions
#######################################

classes:
  BaseDataset:
    abstract: true
    description: Base schema for all dataset types with common metadata attributes
    mixins: [DiseaseMixin, CommonMetadataMixin]
    attributes:
      title:
        title: Title
        range: string
        required: true
      keywords:
        title: Keywords
        range: string
        multivalued: true
        required: true
      funder:
        title: Funder
        range: string
        multivalued: true
        required: false
      participant_count:
        title: Participant Count
        range: integer
        description: Number of unique individuals included in the dataset (whether as individual-level or as aggregate data). Omit if not applicable/unknown.
        required: false
      curationLevel:
        title: Curation level
        range: CurationLevelEnum
        description: TBD
        required: false
      datePublished:
        title: Date Published
        description: Date data were published/available on Synapse.
        range: integer
        required: false

  ClinicalDataset:
    is_a: BaseDataset
    description: Dataset containing subject-level longitudinal clinical data where each file contains aggregate level subject data across multiple timepoints
    attributes:
      studyType:
        title: Study type
        range: StudyLevelEnum
        description: Study type for dataset (longitudinal, cross-sectional, etc.)
        required: false
        multivalued: true
      dataType:
        title: Data Type
        range: ClinicalDataTypeEnum
        description: Clinical data types (assessments, treatments, medical history, etc.)
        multivalued: true
        required: false
      studyDesign:
        title: Study Design
        range: StudyDesignEnum
        description: Type of clinical study design
        required: false
      followUpDuration:
        title: Follow-up Duration
        range: float
        description: Study follow-up period in months
        required: false
      primaryOutcome:
        title: Primary Outcome Measure
        range: string
        description: Primary clinical endpoint or outcome measure
        required: false
      assessmentTypes:
        title: Assessment Types
        range: AssessmentTypeEnum
        description: Types of clinical assessments included in the dataset
        multivalued: true
        required: false
      visitSchedule:
        title: Visit Schedule
        range: string
        description: Description of visit schedule (e.g., "Baseline, 3, 6, 12 months")
        required: false

  OmicDataset:
    is_a: BaseDataset
    mixins: [OmicDatasetMixin]
    description: Dataset containing sample-level omic data where typically each file represents a singular sample with technical and biological metadata
    attributes:
      dataType:
        title: Data Type
        range: OmicDataTypeEnum
        description: Omic data types (genomics, transcriptomics, proteomics, etc.)
        multivalued: true
        required: false
      platform:
        title: Platform
        range: PlatformEnum
        description: Sequencing or analysis platform used
        required: false
      libraryStrategy:
        title: Library Strategy
        range: LibraryStrategyEnum
        description: Sequencing library strategy (RNA-seq, WGS, ChIP-seq, etc.)
        required: false
      processingLevel:
        title: Processing Level
        range: ProcessingLevelEnum
        description: Level of data processing (raw, processed, analyzed)
        multivalued: true
        required: false
      dataFormat:
        title: Data Format
        range: Data
        description: File format of the omic data
        multivalued: true
        required: false

enums:
  ClinicalDataTypeEnum:
    permissible_values:
      clinical_assessment:
        description: Clinical assessment data
      treatment:
        description: Treatment and medication data
      medical_history:
        description: Medical history data
      laboratory_results:
        description: Laboratory test results
      vital_signs:
        description: Vital signs measurements
      neurological_assessment:
        description: Neurological examination data
      psychiatric_assessment:
        description: Psychiatric evaluation data
      electrophysiology:
        description: Electrophysiology assessment data
      hand_held_dynamometry:
        description: Hand-held dynamometry measurements
      genetic_profile:
        description: Genetic testing results
      study_management:
        description: Study management metadata
      data_management:
        description: Data management and quality metrics

  StudyDesignEnum:
    permissible_values:
      longitudinal:
        description: Longitudinal study with repeated measures
      cross_sectional:
        description: Cross-sectional study at single timepoint
      case_control:
        description: Case-control study design
      cohort:
        description: Cohort study design
      interventional:
        description: Interventional clinical trial
      observational:
        description: Observational study

  AssessmentTypeEnum:
    permissible_values:
      alsfrs_r:
        description: ALS Functional Rating Scale - Revised
      neurological_exam:
        description: Neurological examination
      psychiatric_eval:
        description: Psychiatric evaluation
      vital_signs:
        description: Vital signs assessment
      laboratory:
        description: Laboratory assessments
      electrophysiology:
        description: Electrophysiology testing
      dynamometry:
        description: Hand-held dynamometry testing
      genetic_testing:
        description: Genetic profiling

  OmicDataTypeEnum:
    permissible_values:
      genomics:
        description: Genomic sequencing data
      transcriptomics:
        description: Gene expression data
      proteomics:
        description: Protein expression data
      metabolomics:
        description: Metabolite profiling data
      epigenomics:
        description: Epigenetic modification data
      metagenomics:
        description: Metagenomic sequencing data
      single_cell:
        description: Single-cell analysis data
      multi_omics:
        description: Multi-omic integrated data

  LibraryStrategyEnum:
    permissible_values:
      RNA_seq:
        description: RNA sequencing
      WGS:
        description: Whole genome sequencing
      WES:
        description: Whole exome sequencing
      ChIP_seq:
        description: Chromatin immunoprecipitation sequencing
      ATAC_seq:
        description: Assay for transposase-accessible chromatin
      bisulfite_seq:
        description: Bisulfite sequencing
      amplicon_seq:
        description: Amplicon sequencing
      targeted_seq:
        description: Targeted sequencing panel

