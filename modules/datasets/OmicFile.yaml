#######################################
# Omic File Schema  
# For omic data files (genomics, transcriptomics, etc.)
#######################################

classes:
  OmicFile:
    is_a: BaseFile
    mixins: [OmicFileMixin]
    description: File containing omic data such as sequencing, expression, or proteomics data
    slots:
      - fileFormat
      - platform
    attributes:
      # Omic-specific data types
      dataType:
        title: Data Type
        range: OmicDataTypeEnum
        description: Omic data types (genomics, transcriptomics, proteomics, etc.)
        multivalued: true
        required: false
      referenceGenome:
        title: Reference Genome
        range: GenomicReferenceEnum
        description: Reference genome used for alignment
        required: false
      variantType:
        title: Variant Type
        range: VariantTypeEnum
        description: Type of genetic variant for VCF files
        multivalued: true
        required: false
      site_of_onset:
        title: Site of Onset
        range: SiteOfOnsetEnum
        description: Site of disease onset for the subject (e.g., Bulbar, Limb, Lumbar)
        multivalued: true
        required: false

      # Sample tracking
      sampleIdColumn:
        title: Sample ID Column
        range: string
        description: Name of the column containing sample identifiers
        required: false

      # Biospecimen Collection and Storage
      collectionSite:
        title: Collection Site
        description: Site or institution where biospecimen was collected
        range: string
        required: false
      storageContainer:
        title: Storage Container
        description: Container or repository where biospecimen is stored
        range: string
        required: false