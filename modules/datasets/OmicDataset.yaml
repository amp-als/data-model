#######################################
# Omic Dataset Schema  
# For sample-level omic data where each file represents individual samples
#######################################

classes:
  OmicDataset:
    is_a: BaseDataset
    mixins: [OmicDatasetMixin]
    description: Dataset containing sample-level omic data where typically each file represents a singular sample with technical and biological metadata
    slots:
      - platform
    attributes:
      # Omic-specific data types
      dataType:
        title: Data Type
        range: OmicDataTypeEnum
        description: Omic data types (genomics, transcriptomics, proteomics, etc.)
        multivalued: true
        required: false

# Enums for this class are defined canonically in dedicated modules and shared
# with the file-level OmicFile schema (see Makefile OmicDataset target):
#   OmicDataTypeEnum          -> modules/omics/data-types.yaml
#   LibraryPreparationMethodEnum -> modules/omics/parameters.yaml (via OmicDatasetMixin slot)

